apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: traefik
  namespace: network
spec:
  interval: 5m
  # Avoid failed upgrades leaving a stuck Deployment; replaces resources when needed.
  upgrade:
    force: true
  chart:
    spec:
      chart: traefik
      version: '~21'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: network #correct namespace.
  values:
    updateStrategy:
      type: Recreate
      rollingUpdate: null
    persistence:
      enabled: true
    certResolvers:
      cert-resolver:
        email: rsahlgren@gmail.com
        httpChallenge:
          entryPoint: web
        storage: /data/acme.json
    globalArguments:
      - "--global.sendanonymoususage=false"
      - "--global.checknewversion=false"
    additionalArguments:
      - "--serversTransport.insecureSkipVerify=true"
    logs:
      general:
        level: DEBUG
      access:
        enabled: true
    deployment:
      enabled: true
      replicas: 1
      initContainers:
        - name: volume-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              touch /data/acme.json
              chown -v 65532:65532 /data/acme.json
              chmod -v 600 /data/acme.json
          securityContext:
            runAsNonRoot: false
            runAsGroup: 0
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
    ports:
      web:
        redirectTo: websecure
      websecure:
        tls:
          enabled: true
      # Stalwart mail (mailserver/ingress_tcp_stalwart.yml). Use unprivileged container
      # ports: Traefik runs as non-root and cannot bind to :993 / :587 (<1024).
      imap:
        port: 10993
        expose: true
        exposedPort: 993
        protocol: TCP
      submission:
        port: 10587
        expose: true
        exposedPort: 587
        protocol: TCP
    ingressRoute:
      dashboard:
        enabled: false
    providers:
      kubernetesCRD:
        enabled: true
        ingressClass: traefik-external
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: false
    rbac:
      enabled: true
    service:
      enabled: true
      type: LoadBalancer
      spec:
        loadBalancerIP: 130.236.253.195
        allocateLoadBalancerNodePorts: false