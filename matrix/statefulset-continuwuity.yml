apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: continuwuity
  namespace: matrix
  labels:
    app.kubernetes.io/name: continuwuity
spec:
  replicas: 1
  serviceName: continuwuity
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app.kubernetes.io/name: continuwuity
  template:
    metadata:
      labels:
        app.kubernetes.io/name: continuwuity
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: continuwuity
          image: ghcr.io/continuwuity/continuwuity:latest
          imagePullPolicy: IfNotPresent
          command: ["/sbin/conduwuit"]
          ports:
            - name: http
              containerPort: 6167
          env:
            - name: CONTINUWUITY_CONFIG
              value: /etc/continuwuity/continuwuity.toml
            - name: CONTINUWUITY_SERVER_NAME
              value: chat.sax.lgbt
            - name: CONTINUWUITY_DATABASE_PATH
              value: /srv/data/db
            - name: CONTINUWUITY_ADDRESS
              value: "0.0.0.0"
            - name: CONTINUWUITY_PORT
              value: "6167"
            - name: CONTINUWUITY_MAX_REQUEST_SIZE
              value: "20000000"
            - name: CONTINUWUITY_ALLOW_FEDERATION
              value: "true"
            - name: CONTINUWUITY_TRUSTED_SERVERS
              value: '["matrix.org"]'
            - name: CONTINUWUITY_WELL_KNOWN__CLIENT
              value: https://chat.sax.lgbt
            - name: CONTINUWUITY_WELL_KNOWN__SERVER
              value: chat.sax.lgbt:443
            - name: CONTINUWUITY_ALLOW_REGISTRATION
              value: "true"
            - name: CONTINUWUITY_REGISTRATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: continuwuity-registration
                  key: token
            - name: RUST_LOG
              value: info
            - name: CONTINUWUITY_ADMIN_EXECUTE
              value: '["users create-user admin", "users make-user-admin admin"]'
            - name: CONTINUWUITY_ADMIN_EXECUTE_ERRORS_IGNORE
              value: "true"
            - name: CONTINUWUITY_ADMIN_EXECUTE
              value: '["users create-user admin","users make-user-admin admin"]'
            - name: CONTINUWUITY_ADMIN_EXECUTE_ERRORS_IGNORE
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /etc/continuwuity
              readOnly: true
            - name: data
              mountPath: /srv
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          startupProbe:
            httpGet:
              path: /_matrix/federation/v1/version
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /_matrix/federation/v1/version
              port: http
            initialDelaySeconds: 5
            periodSeconds: 4
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /_matrix/federation/v1/version
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: continuwuity-config
        - name: data
          persistentVolumeClaim:
            claimName: continuwuity-data
