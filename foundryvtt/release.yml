apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: foundryvtt
  namespace: foundryvtt
spec:
  interval: 5m
  chart:
    spec:
      chart: foundry-vtt
      version: '~0'
      sourceRef:
        kind: HelmRepository
        name: foundryvtt
        namespace: foundryvtt
  values:
    container:
      timezone: 'Europe/Stockholm'
      preserveConfig: true
    foundryvtt:
      existingLicenseType: "account"
      existingSecret: foundryvtt-secrets
      existingUserSecret: foundryvtt-secrets
      release_url: blahaj.lgbt
      hostname: "foundry.profanitybandits.net"
      proxyPort: "443"
      proxySSL: true
      s3:
        enabled: true
        existingSecret: foundryvtt-s3
      version: '14.359'
    service:
      tls: false
    persistence:
      enabled: true
      size: 32Gi
      storageClass: 'rook-ceph'
    image:
      tag: release
      pullPolicy: Always
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: foundryvtt-foundry-vtt
            patch: |
              - op: add
                path: /spec/template/spec/hostAliases
                value:
                  - ip: 10.255.132.92
                    hostnames:
                      - rgw.ctrl-c.liu.se
                      - foundryvtt-data.rgw.ctrl-c.liu.se
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: foundry-sftp-backup-key
                  secret:
                    secretName: foundry-sftp-backup-key
                    defaultMode: 256
              - op: add
                path: /spec/template/spec/containers/-
                value:
                  name: sftp-backup
                  image: alpine:3.20
                  env:
                    - name: TZ
                      value: Europe/Stockholm
                    - name: SFTP_HOST
                      value: files.sax.lgbt
                    - name: SFTP_USER
                      value: foundry-backup
                    - name: SFTP_PORT
                      value: "22"
                    - name: SFTP_BACKUP_CRON
                      value: "5 17 * * *"
                  resources:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      memory: 512Mi
                  volumeMounts:
                    - name: data
                      mountPath: /data
                      readOnly: true
                    - name: foundry-sftp-backup-key
                      mountPath: /run/sftp-backup/id_ed25519
                      subPath: ssh-privatekey
                      readOnly: true
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -e
                      apk add -q --no-cache openssh-client dcron
                      mkdir -p /tmp/sftp-backup
                      cp /run/sftp-backup/id_ed25519 /tmp/sftp-backup/id_ed25519
                      chmod 600 /tmp/sftp-backup/id_ed25519
                      U="$SFTP_USER"
                      H="$SFTP_HOST"
                      P="${SFTP_PORT:-22}"
                      CR="${SFTP_BACKUP_CRON:-0 3 * * *}"
                      cat <<EOF > /usr/local/bin/sftp-backup.sh
                      #!/bin/sh
                      set -e
                      STAMP=\$(date +%Y%m%dT%H%M)
                      DST="${U}@${H}:./snapshot-\${STAMP}"
                      echo "sftp-backup: uploading /data -> \$DST" >&2
                      if [ "$P" = "22" ]; then
                        exec scp -i /tmp/sftp-backup/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -r /data "\$DST"
                      else
                        exec scp -P "$P" -i /tmp/sftp-backup/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -r /data "\$DST"
                      fi
                      EOF
                      chmod 0755 /usr/local/bin/sftp-backup.sh
                      printf '%s /usr/local/bin/sftp-backup.sh\n' "$CR" > /etc/crontabs/root
                      exec crond -f -l 8
