apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stalwart-mailserver
  namespace: mailserver
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: stalwart-mail
      version: "~1.0.6"
      sourceRef:
        kind: HelmRepository
        name: stalwart-charts
        namespace: mailserver
  valuesFrom:
    - kind: Secret
      name: stalwart-mail-private-values
      valuesKey: values.yaml
      optional: true
  values:
    replicaCount: 1

    image:
      registry: ghcr.io
      repository: stalwartlabs/stalwart
      tag: "v0.15.5"

    ingress:
      enabled: false

    traefik:
      enabled: false

    certificate:
      certmanager:
        enabled: false

    nats:
      enabled: false

    # Chart default backup init uses POD_INDEX (apps.kubernetes.io/pod-index), which ordinals provide; without ordinals the init loops forever. Disable until cluster is 1.27+ or chart fixes this.
    backup:
      enabled: false

    config:
      http:
        use-x-forwarded: true
      # Without StatefulSet ordinals, POD_INDEX is empty and chart default node-id breaks config (see pod logs). Single-node: use a fixed id.
      cluster:
        node-id: "0"

    persistence:
      enabled: true
      size: 10Gi

    # TEMP (remove after login works): inline secrets override valuesFrom for debugging. Login: user "admin", password below.
    secrets:
      env:
        FALLBACK_ADMIN_SECRET: "TempStalwart-Login-TEST-2026"
        METRICS_USERNAME: "metrics"
        METRICS_SECRET: "TempStalwart-Login-TEST-2026"
  # Post-render: chart omits serviceName; strips ordinals (1.27+). No namespace on patch target — Helm output omits metadata.namespace.
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: stalwart-mailserver
            patch: |
              - op: remove
                path: /spec/ordinals
              - op: add
                path: /spec/serviceName
                value: stalwart-mailserver
