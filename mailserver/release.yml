apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stalwart-mailserver
  namespace: mailserver
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: stalwart-mail
      version: "~1.0.6"
      sourceRef:
        kind: HelmRepository
        name: stalwart-charts
        namespace: mailserver
  valuesFrom:
    - kind: Secret
      name: stalwart-mail-private-values
      valuesKey: values.yaml
      optional: true
  values:
    replicaCount: 1

    image:
      registry: ghcr.io
      repository: stalwartlabs/stalwart
      tag: "v0.15.5"

    ingress:
      enabled: false

    traefik:
      enabled: false

    certificate:
      certmanager:
        enabled: false

    nats:
      enabled: false

    backup:
      enabled: false

    config:
      http:
        use-x-forwarded: true
      cluster:
        node-id: "0"

    persistence:
      enabled: true
      size: 10Gi

    secrets:
      env:
        FALLBACK_ADMIN_SECRET: "TempStalwart-Login-TEST-2026"
        METRICS_USERNAME: "metrics"
        METRICS_SECRET: "TempStalwart-Login-TEST-2026"

  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: stalwart-mailserver
            patch: |
              - op: remove
                path: /spec/ordinals
              - op: add
                path: /spec/serviceName
                value: stalwart-mailserver
