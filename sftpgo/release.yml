apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sftpgo
  namespace: sftpgo
  annotations:
    pb-infra/reconcile-after-quota: "2026-04-06"
spec:
  interval: 10m
  timeout: 15m
  install:
    remediation:
      retries: 5
  dependsOn:
    - name: pg
      namespace: sftpgo
  chart:
    spec:
      chart: sftpgo
      version: "0.44.0"
      sourceRef:
        kind: HelmRepository
        name: sftpgo-charts
        namespace: sftpgo
  values:
    sftpd:
      enabled: true
    ftpd:
      enabled: false
    webdavd:
      enabled: false
    httpd:
      enabled: true
    ui:
      ingress:
        enabled: false
    api:
      ingress:
        enabled: false
    persistence:
      enabled: true
      pvc:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: 'rook-ceph'
    config:
      data_provider:
        driver: postgresql
        name: sftpgo
        host: pg-postgresql.sftpgo.svc.cluster.local
        port: 5432
        username: sftpgo
        # Relative user home dirs are rooted here (PVC: /var/lib/sftpgo).
        users_base_dir: /var/lib/sftpgo/users
    envVars:
      - name: SFTPGO_HTTPD__BINDINGS__0__BASE_URL
        value: https://files.sax.lgbt
      - name: SFTPGO_DATA_PROVIDER__PASSWORD
        valueFrom:
          secretKeyRef:
            name: sftpgo-db
            key: password
