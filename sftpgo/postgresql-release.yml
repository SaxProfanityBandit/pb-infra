apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pg
  namespace: sftpgo
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: postgresql
      version: "16.7.24"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: sftpgo
  values:
    global:
      security:
        allowInsecureImages: true
    image:
      tag: latest
    architecture: standalone
    auth:
      username: sftpgo
      database: sftpgo
      existingSecret: sftpgo-db
      secretKeys:
        adminPasswordKey: postgres-password
        userPasswordKey: password
    primary:
      persistence:
        enabled: true
        size: 10Gi
        storageClass: 'rook-ceph'
